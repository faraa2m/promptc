name: Release

# Changesets-driven release automation for the 5 @promptc/* packages.
#
# Flow:
#   1. Contributor runs `bunx changeset` and commits the generated .md
#      into `.changeset/` on their feature branch.
#   2. Feature PR merges to main. This workflow detects pending changesets
#      and opens a "Version Packages" PR that consumes them: bumps every
#      package in the `fixed` group (.changeset/config.json) to the same
#      version and rewrites CHANGELOG.md files.
#   3. The Version Packages PR is reviewed and merged. This workflow runs
#      again, this time with no pending changesets, and instead invokes
#      `changeset:publish` — which builds all packages and runs
#      `changeset publish` to push to npm. The changesets action then
#      creates a single GitHub Release tagged `v<version>` covering all
#      5 packages (because they're in the `fixed` group).
#
# Auth:
#   * GITHUB_TOKEN — default workflow token, used to open the Version PR
#     and create the GH Release.
#   * npm Trusted Publisher (OIDC) — no long-lived NPM_TOKEN secret is
#     used. The job requests a short-lived GitHub OIDC token via
#     `permissions.id-token: write`; `actions/setup-node` writes an
#     `.npmrc` pointing at registry.npmjs.org; and `npm publish` exchanges
#     that OIDC token for a one-shot publish credential against the
#     trusted-publisher binding configured on each npm package. The same
#     OIDC token also signs the tarball provenance attestation
#     (`NPM_CONFIG_PROVENANCE=true`), linking every published version back
#     to this exact workflow run.
#
#   Per-package binding requirement: npm does not (yet) offer org-level
#   Trusted Publishers, so the npm UI binding (npm package page →
#   Settings → Publishing access → Add trusted publisher) must be
#   configured separately on EACH of the 5 packages:
#     @promptc/ir, @promptc/parser, @promptc/passes, @promptc/codegen,
#     @promptc/cli. Each binding points at owner `faraa2m`, repo
#     `promptc`, workflow `release.yml`. Without all 5 bindings the
#     `changeset publish` step will fail partway through with E403 on
#     the first unbound package.
#
#   Migration motive: a granular NPM_TOKEN cannot bypass npm's
#   "2FA required for publishing" policy that auto-attaches to packages
#   after their first publish. Subsequent token-auth publishes against
#   such packages fail with a misleading E404 from the registry.
#   Trusted Publisher OIDC sidesteps the 2FA gate (OIDC is the second
#   factor) and eliminates the secret rotation surface entirely.
#
# Why this replaces publish.yml's release-trigger flow:
#   publish.yml fires on `release.published` and runs `npm publish` per
#   package. Changesets creates that release itself AFTER it publishes,
#   so leaving publish.yml as-is would cause a duplicate publish attempt
#   and fail with E409 "cannot publish over previously published version".
#   This PR replaces publish.yml entirely — see PR body, option (c).

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Open Version PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so changesets can read prior tags and write
          # complete CHANGELOG entries.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          # Node 20+ required for npm provenance attestations.
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest
        # Trusted Publisher OIDC token-exchange requires npm >= 11.5.1.
        # Node 20 ships with npm 10.x which can sign provenance but cannot
        # exchange the GitHub OIDC token for an npm publish credential —
        # PUT to the registry returns a misleading 404. Upgrading here is
        # the minimum-blast-radius fix until Node ships with npm 11.5.1+.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        # Build before test (mirrors publish.yml rationale): cross-package
        # imports resolve via dist/index.js, so test suites fail without
        # dist/ populated first.
        run: bun run --filter '*' build

      - name: Test
        run: bun test

      - name: Run changesets action
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist on main: opens / updates the
          # "Version Packages" PR using this command.
          version: bun run changeset:version
          # When no pending changesets exist on main: builds + publishes
          # all packages to npm using this command, then creates the
          # GitHub Release.
          publish: bun run changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: publish auth comes from the GitHub OIDC token
          # exchanged against each package's npm Trusted Publisher binding.
          # See the header comment for the full flow and the per-package
          # binding requirement.
          #
          # Auto-add `--provenance` to every `npm publish` call. Combined with
          # `id-token: write` (set at the job level), npm signs the tarball
          # with a GitHub OIDC attestation that links it back to this workflow
          # run. Matches the provenance guarantee the prior publish.yml gave.
          NPM_CONFIG_PROVENANCE: "true"
